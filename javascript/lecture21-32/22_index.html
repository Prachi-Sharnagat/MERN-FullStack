<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock & Timer</title>
</head>
<body>

    <h2>Countdown Timer</h2>

    <input
        type="number"
        id="input"
        placeholder="Enter seconds"
        min="1"
    >

    <button id="btn-enter">Start Timer</button>

    <h1 id="stop-watch">0</h1>

    <hr>

    <h2>Digital Clock</h2>

    <h1 id="time-clock">00:00:00</h1>

    <button id="start-btn">Start Clock</button>
    <button id="btn">Stop Clock</button>

    <script src="22_script.js"></script>

</body>
</html>
